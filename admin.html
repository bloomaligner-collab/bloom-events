<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bloom Raffle · Admin · All Events</title>
<link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%231BACDB'/></svg>" />
<style>
  :root {
    --cyan: #1BACDB;
    --deep-cyan: #0E6E92;
    --charcoal: #2A2F30;
    --pink: #E91E63;
    --fr-blue: #0055A4;
    --fr-red: #EF4135;
    --soft-bg: #F4F8FB;
    --bg: #F0F4F8;
    --text: #2A2F30;
    --muted: #6E7779;
    --border: #E1E8EE;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    color: var(--text);
    background: var(--bg);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ============ LOGIN ============ */
  .login-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background: linear-gradient(180deg, #FFF 0%, var(--soft-bg) 100%);
  }
  .login-card {
    width: 100%;
    max-width: 380px;
    background: #fff;
    border-radius: 20px;
    padding: 32px 28px;
    box-shadow: 0 12px 40px rgba(20, 50, 80, 0.10);
    position: relative;
    overflow: hidden;
  }
  .login-card::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 5px;
    background: linear-gradient(90deg,
      var(--fr-blue) 0% 33.3%, #fff 33.3% 66.6%, var(--fr-red) 66.6% 100%);
  }
  .login-logo {
    display: block;
    width: 70%;
    max-width: 240px;
    height: auto;
    margin: 0 auto 6px;
  }
  .topbar-logo {
    height: 36px;
    width: auto;
    display: block;
  }
  .login-brand {
    text-align: center;
    margin-bottom: 8px;
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    font-size: 36px;
    font-weight: 300;
    letter-spacing: -1px;
    color: var(--charcoal);
  }
  .login-brand span { color: var(--cyan); }
  .login-tag {
    text-align: center;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 24px;
  }
  .login-card h1 {
    font-size: 18px;
    font-weight: 700;
    color: var(--charcoal);
    margin-bottom: 18px;
    text-align: center;
  }

  /* ============ APP ============ */
  .app { display: none; padding: 20px; max-width: 1300px; margin: 0 auto; }
  .app.show { display: block; }

  header.topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    background: #fff;
    border-radius: 16px;
    margin-bottom: 18px;
    box-shadow: 0 2px 8px rgba(20, 50, 80, 0.04);
  }
  .topbar-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    font-size: 22px;
    font-weight: 300;
    letter-spacing: -0.5px;
    color: var(--charcoal);
  }
  .topbar-brand span { color: var(--cyan); }
  .topbar-brand small {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-left: 12px;
    border-left: 2px solid var(--border);
    padding-left: 12px;
  }
  .user-strip { display: flex; align-items: center; gap: 12px; }
  .user-email {
    font-size: 13px;
    color: var(--muted);
  }

  /* Stats */
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 14px;
    margin-bottom: 18px;
  }
  .stat {
    background: #fff;
    border-radius: 14px;
    padding: 16px 18px;
    box-shadow: 0 2px 8px rgba(20, 50, 80, 0.04);
    position: relative;
    overflow: hidden;
  }
  .stat::before {
    content: "";
    position: absolute;
    top: 0; left: 0; bottom: 0;
    width: 4px;
    background: var(--cyan);
  }
  .stat.fr::before { background: var(--fr-red); }
  .stat.ch::before { background: var(--pink); }
  .stat .stat-num { font-size: 32px; font-weight: 800; color: var(--charcoal); line-height: 1; }
  .stat .stat-lbl { font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-top: 6px; }

  /* Toolbar */
  .toolbar {
    background: #fff;
    border-radius: 16px;
    padding: 14px 16px;
    margin-bottom: 14px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
    box-shadow: 0 2px 8px rgba(20, 50, 80, 0.04);
  }
  .search-input {
    flex: 1;
    min-width: 200px;
    padding: 10px 14px;
    border: 2px solid var(--border);
    border-radius: 10px;
    font-size: 14px;
    font-family: inherit;
    background: var(--soft-bg);
    color: var(--text);
  }
  .search-input:focus {
    outline: none;
    border-color: var(--cyan);
    background: #fff;
  }

  .event-select {
    padding: 10px 14px; border-radius: 10px; cursor: pointer;
    background: rgba(34,211,238,.08); color: var(--cyan);
    border: 1px solid var(--cyan); font-weight: 700; font-size: 14px;
  }
  .event-select option { background: #0b1220; color: #e2e8f0; }
  .event-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    border: 2px solid var(--border);
    border-radius: 10px;
    background: var(--soft-bg);
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    user-select: none;
    cursor: pointer;
    transition: all 0.15s;
  }
  .event-toggle:hover { border-color: var(--cyan); }
  .event-toggle input { cursor: pointer; width: 16px; height: 16px; accent-color: var(--cyan); }
  .event-toggle.active {
    background: linear-gradient(135deg, #e0f7ff, #fff);
    border-color: var(--cyan);
    color: var(--cyan);
  }

  button {
    cursor: pointer;
    font-family: inherit;
    border: none;
    transition: transform 0.08s, box-shadow 0.15s, background 0.15s;
  }
  .btn {
    padding: 10px 18px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .btn-primary {
    background: var(--cyan);
    color: #fff;
    box-shadow: 0 3px 10px rgba(27, 172, 219, 0.30);
  }
  .btn-primary:hover { background: var(--deep-cyan); }
  .btn-fr {
    background: var(--fr-red);
    color: #fff;
    box-shadow: 0 3px 10px rgba(239, 65, 53, 0.30);
  }
  .btn-fr:hover { background: #D32F2F; }
  .btn-ghost {
    background: transparent;
    color: var(--charcoal);
    border: 2px solid var(--border);
  }
  .btn-ghost:hover { background: var(--soft-bg); border-color: var(--cyan); color: var(--cyan); }
  .btn-block {
    width: 100%;
    padding: 14px;
    font-size: 15px;
    background: var(--cyan);
    color: #fff;
    border-radius: 12px;
    font-weight: 700;
    letter-spacing: 1px;
  }
  .btn-block:hover { background: var(--deep-cyan); }
  .btn-block:disabled { background: #B5C0C7; cursor: not-allowed; }

  input[type="email"], input[type="password"] {
    width: 100%;
    padding: 13px 14px;
    border: 2px solid var(--border);
    border-radius: 10px;
    font-size: 15px;
    font-family: inherit;
    color: var(--text);
    background: #fff;
    margin-bottom: 12px;
  }
  input:focus { outline: none; border-color: var(--cyan); box-shadow: 0 0 0 3px rgba(27,172,219,0.12); }
  input + label, .field-label { display: block; font-size: 13px; font-weight: 600; color: var(--charcoal); margin-bottom: 5px; }

  .alert {
    margin-top: 10px;
    padding: 10px 12px;
    background: #FFE6E9;
    color: #C62828;
    border-radius: 10px;
    font-size: 13px;
    display: none;
  }
  .alert.show { display: block; }

  /* Table */
  .table-wrap {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 2px 8px rgba(20, 50, 80, 0.04);
    overflow: hidden;
  }
  .table-scroll { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 900px; }
  thead th {
    background: var(--soft-bg);
    text-align: left;
    padding: 12px 14px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 2px solid var(--border);
    white-space: nowrap;
  }
  tbody td {
    padding: 14px;
    font-size: 14px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  tbody tr:hover { background: var(--soft-bg); }
  tbody tr:last-child td { border-bottom: none; }
  .num-tag {
    display: inline-block;
    background: var(--charcoal);
    color: var(--cyan);
    font-family: "SF Mono", Menlo, Consolas, monospace;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 12px;
  }
  .specialization-tag {
    display: inline-block;
    background: var(--soft-bg);
    color: var(--charcoal);
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
  }
  .empty-state {
    padding: 60px 20px;
    text-align: center;
    color: var(--muted);
  }
  .empty-state h3 { color: var(--charcoal); font-size: 18px; margin-bottom: 6px; }

  /* Modal (winner draw) */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(20, 30, 40, 0.6);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
    animation: fadein 0.2s;
  }
  .modal-overlay.show { display: flex; }
  @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: #fff;
    border-radius: 20px;
    max-width: 460px;
    width: 100%;
    padding: 30px;
    text-align: center;
    position: relative;
    overflow: hidden;
    animation: pop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes pop { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .modal::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 6px;
    background: linear-gradient(90deg, var(--fr-blue) 0% 33.3%, #fff 33.3% 66.6%, var(--fr-red) 66.6% 100%);
  }
  .modal h2 {
    font-size: 22px;
    margin-top: 6px;
    margin-bottom: 4px;
    color: var(--charcoal);
  }
  .modal .winner-num {
    font-family: "SF Mono", Menlo, Consolas, monospace;
    font-size: 56px;
    font-weight: 800;
    color: var(--cyan);
    margin: 16px 0 10px;
    letter-spacing: -1px;
  }
  .modal .winner-name { font-size: 22px; font-weight: 700; color: var(--charcoal); margin-bottom: 6px; }
  .modal .winner-meta { font-size: 13px; color: var(--muted); margin-bottom: 4px; }
  .modal .modal-actions {
    margin-top: 24px;
    display: flex;
    gap: 10px;
    justify-content: center;
  }

  @media (max-width: 600px) {
    .topbar { flex-direction: column; gap: 10px; align-items: flex-start; }
    .toolbar { flex-direction: column; align-items: stretch; }
    .search-input { width: 100%; }
  }
</style>
</head>

    <div class="stat"><div class="stat-num" id="statTotal">—</div><div class="stat-lbl">Total Entries</div></div>
    <div class="stat fr"><div class="stat-num" id="statCountries">—</div><div class="stat-lbl">Countries</div></div>
    <div class="stat ch"><div class="stat-num" id="statToday">—</div><div class="stat-lbl">Today</div></div>
    <div class="stat"><div class="stat-num" id="statSpecs">—</div><div class="stat-lbl">Specializations</div></div>
  </div>

  <div class="toolbar">
    <input class="search-input" id="searchInput" type="text" placeholder="🔍 Search by name, email, country, specialization…" />
    <select class="event-select" id="eventSelect" title="Choose which event's entries to show. Stats, search, export and the winner draw all follow this selection.">
      <option value="marrakech" selected>🇲🇦 Marrakech · 13.06.2026</option>
      <option value="tunis">🇹🇳 Tunis 2026</option>
      <option value="sedo-palma">🇪🇸 SEDO Palma 2026</option>
      <option value="kazdentexpo">🇰🇿 KazDentExpo 2026</option>
      <option value="ALL">🌍 All events</option>
    </select>
    <button class="btn btn-primary" id="exportBtn">📥 Export to Excel</button>
    <button class="btn btn-fr" id="drawBtn">🎲 Draw a winner</button>
    <button class="btn btn-ghost" id="refreshBtn">↻ Refresh</button>
  </div>

  <div class="table-wrap">
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Email</th>
            <th>Specialization</th>
            <th>Clinic</th>
            <th>Country</th>
            <th>Phone</th>
            <th>Event</th>
            <th>Submitted</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="9" class="empty-state"><h3>Loading…</h3></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- ========== MODAL ========== -->
<div class="modal-overlay" id="winnerModal">
  <div class="modal">
    <h2>🏆 Winner!</h2>
    <div class="winner-num" id="winnerNum"></div>
    <div class="winner-name" id="winnerName"></div>
    <div class="winner-meta" id="winnerEmail"></div>
    <div class="winner-meta" id="winnerSpec"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="reDrawBtn">Draw again</button>
      <button class="btn btn-primary" id="closeModalBtn">Close</button>
    </div>
  </div>
</div>

<!-- Supabase + SheetJS -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<script>
  // ============================================================
  // SUPABASE CONFIG — fill these in (same project as index.html)
  // ============================================================
  const SUPABASE_URL = "https://zmgewujgarzdtafzsdfg.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ2V3dWpnYXJ6ZHRhZnpzZGZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyMzIxOTQsImV4cCI6MjA5MzgwODE5NH0.uY6C7XRJdcs6rTF2GfdyIpTjuiqhB7LrJRWF9rVjYw4";
  // ============================================================

  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // DOM
  const loginWrap = document.getElementById('loginWrap');
  const app = document.getElementById('app');
  const loginForm = document.getElementById('loginForm');
  const loginErr = document.getElementById('loginErr');
  const loginBtn = document.getElementById('loginBtn');
  const userEmailEl = document.getElementById('userEmail');
  const logoutBtn = document.getElementById('logoutBtn');
  const searchInput = document.getElementById('searchInput');
  const exportBtn = document.getElementById('exportBtn');
  const drawBtn = document.getElementById('drawBtn');
  const refreshBtn = document.getElementById('refreshBtn');
  const tableBody = document.getElementById('tableBody');
  const winnerModal = document.getElementById('winnerModal');
  const closeModalBtn = document.getElementById('closeModalBtn');
  const reDrawBtn = document.getElementById('reDrawBtn');
  const winnerNum = document.getElementById('winnerNum');
  const winnerName = document.getElementById('winnerName');
  const winnerEmailEl = document.getElementById('winnerEmail');
  const winnerSpecEl = document.getElementById('winnerSpec');

  let entries = []; // cache (raw, all entries from DB)

  // Event filter: every entry carries an `event` value set by its page
  // (marrakech, tunis, sedo-palma, kazdentexpo, ...). 'ALL' shows everything.
  let currentEvent = 'marrakech';
  function getActive() {
    if (currentEvent === 'ALL') return entries;
    return entries.filter(r => (r.event || '') === currentEvent);
  }
  function refreshView() {
    const active = getActive();
    renderTable(active);
    renderStats(active);
    // also re-apply current search filter on top
    const q = (searchInput.value || '').trim().toLowerCase();
    if (q) {
      const filtered = active.filter(r => (
        [r.full_name, r.email, r.specialization, r.clinic_name, r.country, r.phone, fmtNum(r.entry_number)]
          .filter(Boolean)
          .some(s => String(s).toLowerCase().includes(q))
      ));
      renderTable(filtered);
    }
  }

  function fmtNum(n) { return 'BL-' + String(n).padStart(3, '0'); }
  function fmtDate(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    return d.toLocaleString(undefined, {
      year: 'numeric', month: 'short', day: '2-digit',
      hour: '2-digit', minute: '2-digit'
    });
  }
  function escHtml(s) {
    if (s == null) return '';
    return String(s).replace(/[&<>"']/g, c => (
      { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
    ));
  }

  // ========== AUTH ==========
  async function checkAuth() {
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
      showApp(session.user.email);
      await loadEntries();
    } else {
      loginWrap.style.display = 'flex';
      app.classList.remove('show');
    }
  }

  function showApp(email) {
    loginWrap.style.display = 'none';
    app.classList.add('show');
    userEmailEl.textContent = email || '';
  }

  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    loginErr.classList.remove('show');
    loginBtn.disabled = true;
    loginBtn.textContent = 'SIGNING IN…';
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    loginBtn.disabled = false;
    loginBtn.textContent = 'SIGN IN';
    if (error) {
      loginErr.textContent = error.message || 'Sign-in failed.';
      loginErr.classList.add('show');
      return;
    }
    showApp(data.user.email);
    await loadEntries();
  });

  logoutBtn.addEventListener('click', async () => {
    await sb.auth.signOut();
    location.reload();
  });

  // ========== DATA ==========
  async function loadEntries() {
    tableBody.innerHTML = '<tr><td colspan="9" class="empty-state"><h3>Loading entries…</h3></td></tr>';
    const { data, error } = await sb
      .from('raffle_entries')
      .select('*')
      .order('entry_number', { ascending: false });
    if (error) {
      tableBody.innerHTML = `<tr><td colspan="9" class="empty-state"><h3>Error</h3>${escHtml(error.message)}</td></tr>`;
      return;
    }
    entries = data || [];
    refreshView();
  }

  function renderStats(rows) {
    document.getElementById('statTotal').textContent = rows.length;
    const countries = new Set(rows.map(r => (r.country || '').trim().toLowerCase()).filter(Boolean));
    document.getElementById('statCountries').textContent = countries.size;
    const today = new Date().toISOString().slice(0, 10);
    const todayCount = rows.filter(r => (r.created_at || '').slice(0, 10) === today).length;
    document.getElementById('statToday').textContent = todayCount;
    const specs = new Set(rows.map(r => (r.specialization || '').trim()).filter(Boolean));
    document.getElementById('statSpecs').textContent = specs.size;
  }

  function renderTable(rows) {
    if (rows.length === 0) {
      tableBody.innerHTML = '<tr><td colspan="9" class="empty-state"><h3>No entries yet</h3>Once people scan the QR and submit, they\'ll show up here.</td></tr>';
      return;
    }
    tableBody.innerHTML = rows.map(r => `
      <tr>
        <td><span class="num-tag">${fmtNum(r.entry_number)}</span></td>
        <td><strong>${escHtml(r.full_name)}</strong></td>
        <td>${escHtml(r.email)}</td>
        <td><span class="specialization-tag">${escHtml(r.specialization || '')}</span></td>
        <td>${escHtml(r.clinic_name || '—')}</td>
        <td>${escHtml(r.country || '—')}</td>
        <td>${escHtml(r.phone || '—')}</td>
        <td><span class="specialization-tag">${escHtml(r.event || '—')}</span></td>
        <td style="white-space:nowrap; color: var(--muted); font-size:12px;">${escHtml(fmtDate(r.created_at))}</td>
      </tr>
    `).join('');
  }

  // ========== SEARCH ==========
  searchInput.addEventListener('input', () => {
    const q = searchInput.value.trim().toLowerCase();
    const active = getActive();
    if (!q) { renderTable(active); return; }
    const filtered = active.filter(r => (
      [r.full_name, r.email, r.specialization, r.clinic_name, r.country, r.phone, fmtNum(r.entry_number)]
        .filter(Boolean)
        .some(s => String(s).toLowerCase().includes(q))
    ));
    renderTable(filtered);
  });

  // ========== EVENT FILTER ==========
  const eventSelect = document.getElementById('eventSelect');
  eventSelect.addEventListener('change', () => {
    currentEvent = eventSelect.value;
    refreshView();
  });

  refreshBtn.addEventListener('click', loadEntries);

  // ========== EXPORT TO EXCEL ==========
  exportBtn.addEventListener('click', () => {
    const exportSet = getActive();
    if (exportSet.length === 0) { alert('No entries to export yet.'); return; }
    const rows = exportSet.map(r => ({
      'Raffle #':       fmtNum(r.entry_number),
      'Full Name':      r.full_name || '',
      'Email':          r.email || '',
      'Specialization': r.specialization || '',
      'Clinic':         r.clinic_name || '',
      'Country':        r.country || '',
      'Phone':          r.phone || '',
      'Event':          r.event || '',
      'Submitted At':   r.created_at ? new Date(r.created_at).toISOString() : ''
    }));
    const ws = XLSX.utils.json_to_sheet(rows);
    // column widths
    ws['!cols'] = [
      { wch: 10 },{ wch: 26 },{ wch: 32 },{ wch: 30 },
      { wch: 26 },{ wch: 18 },{ wch: 16 },{ wch: 14 },{ wch: 22 }
    ];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Raffle Entries');
    const stamp = new Date().toISOString().slice(0,10);
    const tag = currentEvent === 'ALL' ? 'ALL' : currentEvent;
    XLSX.writeFile(wb, `Bloom-Raffle-${tag}-${stamp}.xlsx`);
  });

  // ========== DRAW WINNER ==========
  function pickRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  function showWinner(w) {
    winnerNum.textContent = fmtNum(w.entry_number);
    winnerName.textContent = w.full_name;
    winnerEmailEl.textContent = w.email;
    winnerSpecEl.textContent = [w.specialization, w.country].filter(Boolean).join(' · ');
    winnerModal.classList.add('show');
  }

  drawBtn.addEventListener('click', () => {
    const pool = getActive();
    if (pool.length === 0) { alert('No entries yet.'); return; }
    const label = currentEvent === 'ALL' ? 'entries (ALL events)' : currentEvent + ' entries';
    if (!confirm(`Draw a random winner from ${pool.length} ${label}?`)) return;
    showWinner(pickRandom(pool));
  });
  reDrawBtn.addEventListener('click', () => {
    const pool = getActive();
    if (pool.length === 0) return;
    showWinner(pickRandom(pool));
  });
  closeModalBtn.addEventListener('click', () => winnerModal.classList.remove('show'));
  winnerModal.addEventListener('click', (e) => {
    if (e.target === winnerModal) winnerModal.classList.remove('show');
  });

  // ========== INIT ==========
  checkAuth();
</script>

</body>
</html>
