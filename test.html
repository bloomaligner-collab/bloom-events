<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bloom · Connection Test</title>
<style>
  body { font-family: Arial, sans-serif; background:#0b1220; color:#e2e8f0; padding:24px; max-width:620px; margin:0 auto; }
  h1 { color:#22d3ee; font-size:20px; }
  button { background:#22d3ee; color:#06121f; border:none; padding:14px 22px; border-radius:10px; font-weight:800; font-size:16px; cursor:pointer; margin:8px 0; }
  pre { background:#0d1626; border:1px solid #334155; border-radius:10px; padding:14px; white-space:pre-wrap; word-break:break-all; font-size:13px; }
  .ok { color:#4ade80; font-weight:800; } .bad { color:#f87171; font-weight:800; }
</style>
</head>
<body>
  <h1>Bloom · Supabase Connection Test</h1>
  <p>Tap the button. It sends a TEST entry (event: <b>connection-test</b>) exactly like the raffle pages do, and shows the raw answer from the server.</p>
  <button id="go">RUN TEST</button>
  <div id="verdict"></div>
  <pre id="out">Waiting…</pre>
<script>
  const URL_ = "https://zmgewujgarzdtafzsdfg.supabase.co/rest/v1/rpc/submit_raffle_entry";
  const KEY  = "sb_publishable_Qi0w7LqM0f9vKk46qQDhjQ_lYwXiWTz";
  document.getElementById('go').addEventListener('click', async () => {
    const out = document.getElementById('out');
    const verdict = document.getElementById('verdict');
    out.textContent = 'Calling server…';
    verdict.innerHTML = '';
    try {
      const res = await fetch(URL_, {
        method: 'POST',
        headers: {
          'apikey': KEY,
          'Authorization': 'Bearer ' + KEY,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          p_full_name: 'Connection Test',
          p_email: 'connection-test@bloomaligner.fr',
          p_specialization: 'Test',
          p_phone: '+0000000000',
          p_clinic_name: null,
          p_country: 'Test',
          p_event: 'connection-test'
        })
      });
      const text = await res.text();
      verdict.innerHTML = res.ok
        ? '<p class="ok">✅ SUCCESS — the system works. Entry number: ' + text + '</p>'
        : '<p class="bad">❌ FAILED — HTTP ' + res.status + '. Send a screenshot of this page to Claude.</p>';
      out.textContent = 'HTTP ' + res.status + ' ' + res.statusText + '\n\n' + text;
    } catch (e) {
      verdict.innerHTML = '<p class="bad">❌ NETWORK ERROR — send a screenshot of this page to Claude.</p>';
      out.textContent = String(e);
    }
  });
</script>
</body>
</html>
